<div class="rec-wrapper">

  <div class="rec-header">
    <h2 class="rec-titulo">Recomendaciones de viaje</h2>
    <p class="rec-sub">Consejos esenciales para que tu viaje sea perfecto</p>
  </div>

  <div class="rec-selector">
    <div class="selector-card">
      <label class="selector-label">Selecciona tu destino</label>
      <select class="selector-select" [(ngModel)]="destinoSeleccionado">
        <option [value]="-1">Seleccionar destino...</option>
        <option *ngFor="let d of destinos" [value]="d.id_destino">{{ d.nom_destino }}</option>
      </select>
      <button class="selector-btn" (click)="buscarRecomendaciones()">Ver recomendaciones</button>
    </div>
  </div>

  <!-- Cargando -->
  <div *ngIf="cargando" class="rec-loading">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>

  <!-- Sin selección -->
  <div *ngIf="!cargando && !mostrarConsejos" class="rec-empty">
    <p>Selecciona un destino para ver las recomendaciones</p>
  </div>

  <!-- Sin tips para ese destino -->
  <div *ngIf="mostrarConsejos && tips.length === 0" class="rec-empty">
    <p>No hay recomendaciones disponibles para este destino aún.</p>
  </div>

  <!-- Tips dinámicos -->
  <div *ngIf="mostrarConsejos && tips.length > 0" class="consejos-grid">
    <div class="consejo-card" *ngFor="let tip of tips">
      <div class="consejo-icon">{{ getIcono(tip.categoria) }}</div>
      <h6 class="consejo-titulo">{{ getLabel(tip.categoria) }}</h6>
      <p class="consejo-contenido">{{ tip.contenido }}</p>
    </div>
  </div>

</div>
